name: Build APK
вЂЋ
вЂЋon:
вЂЋВ  push:
вЂЋВ В В  branches:
вЂЋВ В В В В  - main
вЂЋ
вЂЋjobs:
вЂЋВ  build:
вЂЋВ В В  runs-on: ubuntu-latest
вЂЋ
вЂЋВ В В  steps:
вЂЋВ В В В В  # 1пёЏвѓЈ Checkout the repo
вЂЋВ В В В В  - name: Checkout
вЂЋВ В В В В В В  uses: actions/checkout@v4
вЂЋ
вЂЋВ В В В В  # 2пёЏвѓЈ Setup Java 21
вЂЋВ В В В В  - name: Setup Java
вЂЋВ В В В В В В  uses: actions/setup-java@v4
вЂЋВ В В В В В В  with:
вЂЋВ В В В В В В В В  distribution: 'temurin'
вЂЋВ В В В В В В В В  java-version: '21'
вЂЋ
вЂЋВ В В В В  # 3пёЏвѓЈ Setup Node 18
вЂЋВ В В В В  - name: Setup Node
вЂЋВ В В В В В В  uses: actions/setup-node@v4
вЂЋВ В В В В В В  with:
вЂЋВ В В В В В В В В  node-version: '18'
вЂЋ
вЂЋВ В В В В  # 4пёЏвѓЈ Cache Node modules
вЂЋВ В В В В  - name: Cache Node modules
вЂЋВ В В В В В В  uses: actions/cache@v3
вЂЋВ В В В В В В  with:
вЂЋВ В В В В В В В В  path: ~/.npm
вЂЋВ В В В В В В В В  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
вЂЋВ В В В В В В В В  restore-keys: |
вЂЋВ В В В В В В В В В В  ${{ runner.os }}-node-
вЂЋ
вЂЋВ В В В В  # 5пёЏвѓЈ Install Cordova globally
вЂЋВ В В В В  - name: Install Cordova
вЂЋВ В В В В В В  run: npm install -g cordova
вЂЋ
вЂЋВ В В В В  # 6пёЏвѓЈ Install project dependencies
вЂЋВ В В В В  - name: Install dependencies
вЂЋВ В В В В В В  run: npm install || true
вЂЋ
вЂЋВ В В В В  # 7пёЏвѓЈ Cache Cordova Android platform
вЂЋВ В В В В  - name: Cache Android platform
вЂЋВ В В В В В В  uses: actions/cache@v3
вЂЋВ В В В В В В  with:
вЂЋВ В В В В В В В В  path: platforms/android
вЂЋВ В В В В В В В В  key: ${{ runner.os }}-cordova-android-${{ hashFiles('config.xml') }}
вЂЋВ В В В В В В В В  restore-keys: |
вЂЋВ В В В В В В В В В В  ${{ runner.os }}-cordova-android-
вЂЋ
вЂЋВ В В В В  # 8пёЏвѓЈ Add Android platform (skip if cached)
вЂЋВ В В В В  - name: Add Android platform
вЂЋВ В В В В В В  run: cordova platform add android --no-interactive || echo "Platform already added"
вЂЋ
вЂЋВ В В В В  # 9пёЏвѓЈ Build APK
вЂЋВ В В В В  - name: Build APK
вЂЋВ В В В В В В  run: cordova build android --no-interactive
вЂЋ
вЂЋВ В В В В  # рџ”џ Upload APK artifact
вЂЋВ В В В В  - name: Upload APK
вЂЋВ В В В В В В  uses: actions/upload-artifact@v4
вЂЋВ В В В В В В  with:
вЂЋВ В В В В В В В В  name: MyApp-APK
вЂЋВ В В В В В В В В  path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
